  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0A0A0B; color: #E5E5E5; }
    .font-display { font-family: 'Inter Tight', sans-serif; }
    .glow-neon { text-shadow: 0 0 20px rgba(223,255,0,0.3), 0 0 40px rgba(223,255,0,0.1); }
    .glow-box { box-shadow: 0 0 30px rgba(223,255,0,0.08), 0 0 60px rgba(223,255,0,0.04); }
    .gradient-border { position: relative; background: #111113; border-radius: 1rem; }
    .gradient-border::before {
      content: ''; position: absolute; inset: -1px; border-radius: 1rem; padding: 1px;
      background: linear-gradient(135deg, rgba(223,255,0,0.3), transparent 50%, rgba(0,212,255,0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    .grid-bg {
      background-image: linear-gradient(rgba(223,255,0,0.03) 1px, transparent 1px),

    .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; } .delay-4 { animation-delay: 0.4s; }

    .toast {

      background: #1A1A1F; border: 1px solid rgba(223,255,0,0.3); color: #DFFF00;

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(255,100,100,0.4); color: #ff6b6b; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2);

    .btn-neon {

    .card { background: #111113; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; }

    .sidebar-link {

<body class="antialiased overflow-x-hidden">
  <div id="toast" class="toast"></div>
  <div id="app"></div>

  <script>
  (function() {
    'use strict';

    // =============================================
    // CONFIG
    // =============================================
    const CONFIG = {
      SUPABASE_URL: 'https://rlztmvzgkldhmebewpfe.supabase.co',
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsenRtdnpna2xkaG1lYmV3cGZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODYwODEsImV4cCI6MjA4ODE2MjA4MX0.7EyvUpiAlL7e_opEKX4WQPwqvGueC5HgkOEHG51fndE',
      STRIPE_PK: 'pk_test_51T74GzE9pJ3VvXPnuHTPtGeRlgbdBGQvj62P0fK1naO60Mi1W1iokMc2uc6SHXX4gxw68JCiKNcXu4GuwELjx4Zn00InWggq9p',
    };

    // =============================================
    // SUPABASE CLIENT
    // =============================================
    const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    let currentUser = null;
    let currentProfile = null;

    // =============================================
    // XSS PROTECTION
    // =============================================
    function esc(str) {
      if (str == null) return '';
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str)));
      return d.innerHTML;
    }

    // =============================================
    // UTILITIES
    // =============================================
    const $ = (sel, ctx = document) => ctx.querySelector(sel);
    const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];
    const YEAR = new Date().getFullYear();
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.className = 'toast', 3000);
    }

    function formatDate(d) {
      const dt = new Date(d);
      return `${MONTHS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
    }

    function timeAgo(d) {
      const diff = Date.now() - new Date(d).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function triggerConfetti(el) {
      const colors = ['#DFFF00', '#00D4FF', '#FF6B6B', '#FFD93D', '#6BCB77'];
      const rect = el.getBoundingClientRect();
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*120) + 'px';
        p.style.top = (rect.top + window.scrollY) + 'px';
        p.style.background = colors[Math.floor(Math.random()*colors.length)];
        p.style.animationDuration = (1+Math.random()) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 2000);
      }
    }

    // Cleanup registry for intervals/timeouts on route change
    let _cleanups = [];
    function registerCleanup(fn) { _cleanups.push(fn); }
    function runCleanups() { _cleanups.forEach(fn => { try { fn(); } catch(e) {} }); _cleanups = []; }

    // =============================================
    // ROUTER
    // =============================================
    const routes = {};
    function route(path, handler) { routes[path] = handler; }

    function navigate(path) {
      window.location.hash = path;
    }

    function getRoute() {
      return window.location.hash.slice(1) || '/';
    }

    function matchRoute(path) {
      if (routes[path]) return { handler: routes[path], params: {} };
      for (const [pattern, handler] of Object.entries(routes)) {
        const patternParts = pattern.split('/');
        const pathParts = path.split('/');
        if (patternParts.length !== pathParts.length) continue;
        const params = {};
        let match = true;
        for (let i = 0; i < patternParts.length; i++) {
          if (patternParts[i].startsWith(':')) {
            params[patternParts[i].slice(1)] = decodeURIComponent(pathParts[i]);
          } else if (patternParts[i] !== pathParts[i]) {
            match = false; break;
          }
        }
        if (match) return { handler, params };
      }
      return null;
    }

    let _routeTimer = null;
    let _routing = false;

    async function handleRoute() {
      if (_routing) return;
      _routing = true;
      try {
        runCleanups();
        const path = getRoute();
        const app = document.getElementById('app');

        const { data: { session } } = await supabase.auth.getSession();
        currentUser = session?.user || null;

        if (currentUser) {
          // Profile may not exist immediately after signup (trigger race).
          // Retry up to 5 times with increasing delay.
          let profile = null;
          for (let attempt = 0; attempt < 5; attempt++) {
            const { data, error } = await supabase.from('profiles')
              .select('*').eq('id', currentUser.id).maybeSingle();
            console.log(`[GTW] Profile fetch attempt ${attempt + 1}:`, { data, error: error?.message });
            if (data) {
              profile = data;
              break;
            }
            if (attempt < 4) await new Promise(r => setTimeout(r, 800 * (attempt + 1)));
          }
          currentProfile = profile;

          // If still no profile after all retries, the trigger may have failed.
          // Log it so we can debug.
          if (!profile) {
            console.warn('[GTW] No profile found after 5 attempts for user:', currentUser.id);
          }
        } else {
          currentProfile = null;
        }

        const matched = matchRoute(path);
        if (matched) {
          await matched.handler(app, matched.params);
        } else {
          app.innerHTML = render404();
        }
        lucide.createIcons();
      } catch (err) {
        console.error('Route error:', err);
      } finally {
        _routing = false;
      }
    }

    // Debounced hashchange to prevent rapid-fire navigation
    window.addEventListener('hashchange', () => {
      clearTimeout(_routeTimer);
      _routeTimer = setTimeout(() => handleRoute(), 50);
    });

    function render404() {
      return `
        <div class="min-h-screen flex items-center justify-center">
          <div class="text-center">
            <div class="font-display font-900 text-6xl text-neon mb-4">404</div>
            <p class="text-gray-400 mb-6">Page not found</p>
            <a href="#/" class="btn-neon inline-block">Back Home</a>
          </div>
        </div>`;
    }

    // =============================================
    // AUTH GUARDS — safe against null profile
    // =============================================
    function requireAuth(app) {
      if (!currentUser) { navigate('/login'); return false; }
      if (!currentProfile) {
        app.innerHTML = `<div class="min-h-screen flex items-center justify-center">
          <div class="text-center">
            <span class="spinner"></span>
            <p class="text-gray-400 mt-4">Loading your profile…</p>
          </div>
        </div>`;
        return false;
      }
      return true;
    }
    function requireTrainer(app) {
      if (!requireAuth(app)) return false;
      if (currentProfile.role === 'client') { navigate('/portal'); return false; }
      return true;
    }
    function requirePaid(app) {
      if (!requireTrainer(app)) return false;
      if (!currentProfile.has_paid) { navigate('/checkout'); return false; }
      return true;
    }
    function requireClient(app) {
      if (!requireAuth(app)) return false;
      if (currentProfile.role === 'trainer') {
        if (currentProfile.has_paid) { navigate('/dashboard'); }
        else { navigate('/checkout'); }
        return false;
      }
      return true;
    }

    // =============================================
    // SHARED COMPONENTS
    // =============================================
    function navBar(loggedIn = false) {
      if (loggedIn) {
        const isTrainer = currentProfile?.role === 'trainer';
        const homeLink = isTrainer ? '#/dashboard' : '#/portal';
        return `
        <nav class="fixed top-0 left-0 right-0 z-50 bg-dark-900/80 backdrop-blur-xl border-b border-white/5">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
              <a href="${homeLink}" class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-neon/10 border border-neon/30 flex items-center justify-center">
                  <i data-lucide="zap" class="w-4 h-4 text-neon"></i>
                </div>
                <span class="font-display font-800 text-lg"><span class="text-white">Gym</span><span class="text-neon">to</span><span class="text-white">Web</span></span>
              </a>
              <div class="flex items-center gap-4">
                <span class="text-sm text-gray-400 hidden sm:inline">${esc(currentProfile?.full_name || currentUser?.email)}</span>
                <button onclick="window.GTW.logout()" class="text-sm text-gray-500 hover:text-red-400 transition-colors flex items-center gap-1">
                  <i data-lucide="log-out" class="w-4 h-4"></i>
                  <span class="hidden sm:inline">Logout</span>
                </button>
              </div>
            </div>
          </div>
        </nav>`;
      }
      return `
      <nav class="fixed top-0 left-0 right-0 z-50 bg-dark-900/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex items-center justify-between h-16 sm:h-20">
            <a href="#/" class="flex items-center gap-2 group">
              <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg bg-neon/10 border border-neon/30 flex items-center justify-center group-hover:bg-neon/20 transition-colors">
                <i data-lucide="zap" class="w-4 h-4 sm:w-5 sm:h-5 text-neon"></i>
              </div>
              <span class="font-display font-800 text-lg sm:text-xl tracking-tight"><span class="text-white">Gym</span><span class="text-neon">to</span><span class="text-white">Web</span></span>
            </a>
            <div class="hidden md:flex items-center gap-8">
              <a href="#/" class="text-sm text-gray-400 hover:text-white transition-colors">Home</a>
              <a href="#/login" class="text-sm text-gray-400 hover:text-white transition-colors">Login</a>
              <a href="#/signup" class="bg-neon text-dark-900 font-display font-700 text-sm px-5 py-2.5 rounded-lg hover:bg-neon/90 transition-colors">Get Started</a>
            </div>
            <button id="menu-btn-main" class="md:hidden p-2 text-gray-400 hover:text-white"><i data-lucide="menu" class="w-6 h-6"></i></button>
          </div>
        </div>
        <div id="mobile-nav-main" class="mobile-nav fixed inset-y-0 right-0 w-72 bg-dark-800 border-l border-white/5 z-50 p-6 md:hidden">
          <button id="close-nav-main" class="absolute top-5 right-5 text-gray-400 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
          <div class="flex flex-col gap-6 mt-16">
            <a href="#/" class="text-lg text-gray-300 hover:text-white nav-close">Home</a>
            <a href="#/login" class="text-lg text-gray-300 hover:text-white nav-close">Login</a>
            <a href="#/signup" class="bg-neon text-dark-900 font-display font-700 text-center text-lg px-5 py-3 rounded-lg nav-close">Get Started</a>
          </div>
        </div>
      </nav>`;
    }

    function footer() {
      return `
      <footer class="border-t border-white/5 py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 rounded-lg bg-neon/10 border border-neon/30 flex items-center justify-center">
                <i data-lucide="zap" class="w-4 h-4 text-neon"></i>
              </div>
              <span class="font-display font-800 text-lg"><span class="text-white">Gym</span><span class="text-neon">to</span><span class="text-white">Web</span></span>
            </div>
            <div class="text-sm text-gray-600">&copy; ${YEAR} Gym-to-Web Sync &bull; Halifax, NS</div>
          </div>
        </div>
      </footer>`;
    }

    function initMobileNav() {
      setTimeout(() => {
        const btn = document.getElementById('menu-btn-main');
        const nav = document.getElementById('mobile-nav-main');
        const close = document.getElementById('close-nav-main');
        if (btn && nav) {
          btn.onclick = () => nav.classList.add('open');
          if (close) close.onclick = () => nav.classList.remove('open');
          $$('.nav-close', nav).forEach(l => l.onclick = () => nav.classList.remove('open'));
        }
      }, 0);
    }

    function dashSidebar(active) {
      return `
        <div class="lg:w-56 flex-shrink-0">
          <div class="lg:sticky lg:top-24 space-y-1">
            <a href="#/dashboard" class="sidebar-link ${active === 'overview' ? 'active' : ''}"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Overview</a>
            <a href="#/dashboard/clients" class="sidebar-link ${active === 'clients' ? 'active' : ''}"><i data-lucide="users" class="w-4 h-4"></i> Clients</a>
            <a href="#/dashboard/plans" class="sidebar-link ${active === 'plans' ? 'active' : ''}"><i data-lucide="dumbbell" class="w-4 h-4"></i> Plans</a>
          </div>
        </div>`;
    }

    // =============================================
    // ROUTE: LANDING PAGE (#/)
    // =============================================
    route('/', (app) => {
      // If logged in, redirect to appropriate page
      if (currentUser && currentProfile) {
        if (currentProfile.role === 'trainer') {
          navigate(currentProfile.has_paid ? '/dashboard' : '/checkout');
        } else {
          navigate('/portal');
        }
        return;
      }
      app.innerHTML = `
      ${navBar(false)}
      <!-- HERO -->
      <section class="relative min-h-screen flex items-center grid-bg pt-20">
        <div class="absolute top-1/4 -left-32 w-96 h-96 bg-neon/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-electric/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
          <div class="max-w-4xl">
            <div class="fade-up inline-flex items-center gap-2 bg-dark-700 border border-white/10 rounded-full px-4 py-1.5 mb-6 sm:mb-8">
              <span class="w-2 h-2 bg-neon rounded-full animate-pulse"></span>
              <span class="text-xs sm:text-sm text-gray-400 font-medium">Built for Halifax Trainers &bull; ${YEAR}</span>
            </div>
            <h1 class="fade-up delay-1 font-display font-900 text-4xl sm:text-5xl md:text-6xl lg:text-7xl leading-[1.05] tracking-tight mb-6">
              Stop Renting.<br /><span class="text-neon glow-neon">Own Your Platform.</span>
            </h1>
            <p class="fade-up delay-2 text-lg sm:text-xl text-gray-400 max-w-2xl mb-8 sm:mb-10 leading-relaxed">
              Ditch the $50/month fitness SaaS bloat. Get a custom, branded client portal with
              workout plans & intake forms &mdash; built once, owned forever.

            <div id="card-errors" class="text-red-400 text-sm mb-3 hidden"></div>
            <button id="pay-btn" class="btn-neon w-full">Pay $497 CAD</button>

          </div>
        </div>
      </div>`;

      setTimeout(async () => {
        try {
          const stripe = Stripe(CONFIG.STRIPE_PK);
          const elements = stripe.elements({
            appearance: {
              theme: 'night',
              variables: { colorPrimary: '#DFFF00', colorBackground: '#242429', colorText: '#E5E5E5', borderRadius: '8px' }
            }
          });
          const cardElement = elements.create('card');
          cardElement.mount('#stripe-card-element');

          cardElement.on('change', (event) => {
            const errEl = document.getElementById('card-errors');
            if (!errEl) return;
            if (event.error) {
              errEl.textContent = event.error.message;
              errEl.classList.remove('hidden');

            }
          });

          const payBtn = document.getElementById('pay-btn');
          if (!payBtn) return;

          payBtn.onclick = async () => {
            payBtn.innerHTML = '<span class="spinner"></span> Processing...';
            payBtn.disabled = true;

            try {
              const { data: { session } } = await supabase.auth.getSession();
              if (!session) { showToast('Session expired. Please log in again.', true); navigate('/login'); return; }

              const res = await fetch('/.netlify/functions/create-checkout', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${session.access_token}`
                },
                body: JSON.stringify({ userId: currentUser.id, email: currentUser.email }),
              });

              if (!res.ok) {
                const errData = await res.json().catch(() => ({}));
                throw new Error(errData.error || 'Could not create payment');
              }
              const { clientSecret } = await res.json();

              const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
                payment_method: { card: cardElement }
              });

              if (error) {
                const errEl = document.getElementById('card-errors');
                if (errEl) { errEl.textContent = error.message; errEl.classList.remove('hidden'); }
                payBtn.textContent = 'Pay $497 CAD';

              payBtn.textContent = 'Pay $497 CAD';
              payBtn.disabled = false;
            }
          };
        } catch (err) {
          console.error('Stripe init error:', err);
          showToast('Payment system failed to load. Please refresh.', true);
        }
      }, 100);

      function openEditor(plan = null, assignedIds = []) {
        editingPlanId = plan?.id || null;
        exercises = plan ? [...(plan.exercises || [])] : [{ name: '', sets: '', reps: '', note: '' }];
        const editor = document.getElementById('plan-editor');
        if (!editor) return;
        editor.classList.remove('hidden');
        document.getElementById('editor-title').textContent = plan ? 'Edit Plan' : 'New Workout Plan';
        document.getElementById('plan-title').value = plan?.title || '';
        document.getElementById('plan-dow').value = plan?.day_of_week ?? '';
        renderExercisesBuilder();
        renderAssignClients(assignedIds);
        editor.scrollIntoView({ behavior: 'smooth' });
      }

      function closeEditor() {
        const editor = document.getElementById('plan-editor');
        if (editor) editor.classList.add('hidden');
        editingPlanId = null;

          sets: $('.ex-sets', row)?.value?.trim() || '',
          reps: $('.ex-reps', row)?.value?.trim() || '',

    route('/portal/workout/:planId', async (app, params) => {
      if (!requireClient(app)) return;

      // Validate planId format (UUID)
      if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(params.planId)) {
        navigate('/portal');
        return;
      }

      const { data: plan } = await supabase.from('workout_plans').select('*').eq('id', params.planId).single();
      if (!plan) { navigate('/portal'); return; }

      const exercises = plan.exercises || [];
      const todayKey = new Date().toISOString().split('T')[0];

      const { data: existingLogs } = await supabase.from('workout_logs').select('*')
        .eq('client_id', currentUser.id).eq('plan_id', plan.id)
        .gte('logged_at', todayKey + 'T00:00:00').lte('logged_at', todayKey + 'T23:59:59');

      const logMap = {};
      (existingLogs || []).forEach(l => { logMap[l.exercise_index] = l; });

      let timerStart = null;
      let timerInterval = null;

      // Clean up timer on route change
      registerCleanup(() => { if (timerInterval) clearInterval(timerInterval); });

      app.innerHTML = `
      ${navBar(true)}
      <div class="pt-20 pb-12">
        <div class="max-w-2xl mx-auto px-4 sm:px-6">
          <div class="flex items-center gap-3 mb-6 mt-4">
            <a href="#/portal" class="w-10 h-10 rounded-xl bg-dark-700 flex items-center justify-center hover:bg-dark-600 transition-colors">
              <i data-lucide="arrow-left" class="w-5 h-5 text-gray-400"></i>
            </a>
            <div class="flex-1">
              <h1 class="font-display font-800 text-xl">${esc(plan.title)}</h1>
              <p class="text-xs text-gray-500">${exercises.length} exercises</p>
            </div>
            <div class="text-sm text-gray-400 bg-dark-700 px-3 py-1.5 rounded-lg font-display font-600" id="w-timer">0:00</div>
            <div class="text-sm text-neon bg-neon/10 px-3 py-1.5 rounded-lg font-display font-700" id="w-count">0/${exercises.length}</div>
          </div>

          <div id="w-exercises" class="space-y-2 mb-6"></div>

          <button id="w-start-btn" class="btn-neon w-full mb-4">${Object.keys(logMap).length > 0 ? 'Resume Workout' : 'Start Workout'}</button>
          <a href="#/portal" class="block text-center text-sm text-gray-500 hover:text-white transition-colors">Back to Portal</a>
        </div>
      </div>`;

      function renderWorkout() {
        const container = document.getElementById('w-exercises');
        if (!container) return;
        let doneCount = 0;

        container.innerHTML = exercises.map((ex, i) => {
          const log = logMap[i];
          const done = log?.completed || false;
          if (done) doneCount++;

          return `
            <div class="flex items-center gap-3 bg-dark-700 rounded-xl p-3 transition-all ${done ? 'opacity-50' : ''}" data-idx="${i}">
              <div class="w-9 h-9 rounded-lg ${done ? 'bg-neon/30' : 'bg-neon/10'} flex items-center justify-center flex-shrink-0">
                ${done
                  ? '<svg class="w-4 h-4 text-neon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>'
                  : `<span class="text-neon font-display font-800 text-xs">${String(i+1).padStart(2,'0')}</span>`}
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium ${done ? 'text-gray-600 line-through' : 'text-white'}">${esc(ex.name)}</div>
                <div class="text-[11px] text-gray-500">${esc(ex.sets)} sets &times; ${esc(ex.reps)}${ex.note ? ' &bull; ' + esc(ex.note) : ''}</div>
              </div>
              <input type="text" inputmode="decimal" class="weight-input w-ex-weight" data-idx="${i}"
                placeholder="lbs" value="${esc(log?.weight || '')}" ${!timerStart ? 'disabled' : ''} />
              <button class="w-8 h-8 rounded-lg flex items-center justify-center transition-colors w-ex-done
                ${done ? 'bg-neon/20 text-neon' : 'bg-dark-500 text-gray-600 hover:text-neon hover:bg-neon/10'}"
                data-idx="${i}" ${!timerStart ? 'disabled' : ''}>
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </button>
            </div>`;
        }).join('');

        const countEl = document.getElementById('w-count');
        if (countEl) countEl.textContent = `${doneCount}/${exercises.length}`;

        $$('.w-ex-weight', container).forEach(input => {
          input.onchange = async () => {
            const idx = parseInt(input.dataset.idx);
            const val = parseFloat(input.value);
            if (input.value && (isNaN(val) || val < 0 || val > 9999)) {
              showToast('Invalid weight', true);
              return;
            }
            await upsertLog(idx, { weight: val || null });
          };
        });

        $$('.w-ex-done', container).forEach(btn => {
          btn.onclick = async () => {
            if (!timerStart) return;
            const idx = parseInt(btn.dataset.idx);
            const currentlyDone = logMap[idx]?.completed || false;
            const weightInput = $(`.w-ex-weight[data-idx="${idx}"]`);
            const weight = weightInput ? parseFloat(weightInput.value) || null : null;
            await upsertLog(idx, { completed: !currentlyDone, weight });
            renderWorkout();

            const allDone = exercises.every((_, i) => logMap[i]?.completed);
            if (allDone) {
              showToast('Workout complete! Great session!');
              const countEl = document.getElementById('w-count');
              if (countEl) triggerConfetti(countEl);
            }
          };
        });
      }

      async function upsertLog(exerciseIndex, updates) {
        const existing = logMap[exerciseIndex];
        if (existing) {
          const { data } = await supabase.from('workout_logs').update(updates).eq('id', existing.id).select().single();
          if (data) logMap[exerciseIndex] = data;
        } else {
          const { data } = await supabase.from('workout_logs').insert({
            client_id: currentUser.id,
            plan_id: plan.id,
            exercise_index: exerciseIndex,
            completed: updates.completed || false,
            weight: updates.weight || null,
            reps_done: null,
          }).select().single();
          if (data) logMap[exerciseIndex] = data;
        }
      }

      setTimeout(() => {
        renderWorkout();

        if (Object.keys(logMap).length > 0 && !timerStart) {
          const earliest = Object.values(logMap).sort((a, b) => new Date(a.logged_at) - new Date(b.logged_at))[0];
          timerStart = new Date(earliest.logged_at).getTime();
          function tick() {
            const el = document.getElementById('w-timer');
            if (!el) { clearInterval(timerInterval); return; }
            const s = Math.floor((Date.now() - timerStart) / 1000);
            el.textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
          }
          tick();
          timerInterval = setInterval(tick, 1000);
          renderWorkout();
        }

        const startBtn = document.getElementById('w-start-btn');
        if (startBtn) {
          startBtn.onclick = () => {
            if (timerStart) return;
            timerStart = Date.now();
            function tick() {
              const el = document.getElementById('w-timer');
              if (!el) { clearInterval(timerInterval); return; }
              const s = Math.floor((Date.now() - timerStart) / 1000);
              el.textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
            }
            tick();
            timerInterval = setInterval(tick, 1000);
            startBtn.textContent = 'Workout In Progress...';
            startBtn.classList.add('opacity-50');
            showToast("Let's go!");
            renderWorkout();
          };
        }
      }, 0);
    });

    // =============================================
    // GLOBAL HELPERS
    // =============================================
    window.GTW = {
      logout: async () => {
        await supabase.auth.signOut();
        currentUser = null;
        currentProfile = null;
        _profileRetries = 0;
        showToast('Logged out');
        navigate('/');
      },
      toast: showToast,
      retryProfile: () => {
        _profileRetries = 0;
        _routing = false;
        handleRoute();
      },
    };

    // =============================================
    // AUTH STATE LISTENER
    // =============================================
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT') {
        currentUser = null;
        currentProfile = null;
      }
    });

    // =============================================
    // BOOT
    // =============================================
    handleRoute();
    lucide.createIcons();

  })();
  </script>
